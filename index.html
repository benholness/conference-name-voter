<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conference Name Preference Test</title>
<style>
  :root {
    --bg-primary:    #ffffff;
    --bg-secondary:  #f5f4f0;
    --bg-tertiary:   #efede8;
    --bg-info:       #e8f1fb;
    --bg-success:    #eaf3de;
    --text-primary:  #1a1a18;
    --text-secondary:#5a5a55;
    --text-info:     #174f8a;
    --text-success:  #3b6d11;
    --border-subtle: rgba(26,26,24,0.14);
    --border-mid:    rgba(26,26,24,0.26);
    --border-info:   #378add;
    --border-success:#639922;
    --focus-ring:    #185fa5;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --r-md: 8px;
    --r-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary:    #1e1e1c;
      --bg-secondary:  #2a2a28;
      --bg-tertiary:   #323230;
      --bg-info:       #0c2a4a;
      --bg-success:    #172d07;
      --text-primary:  #f0ede8;
      --text-secondary:#a0a09a;
      --text-info:     #85b7eb;
      --text-success:  #97c459;
      --border-subtle: rgba(240,237,232,0.12);
      --border-mid:    rgba(240,237,232,0.24);
      --border-info:   #378add;
      --border-success:#639922;
      --focus-ring:    #85b7eb;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; animation: none !important; }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2.5rem 1rem;
  }

  /* Skip link for keyboard users */
  .skip-link {
    position: absolute;
    top: -100%;
    left: 1rem;
    background: var(--bg-primary);
    color: var(--text-primary);
    padding: 8px 16px;
    border-radius: var(--r-md);
    border: 2px solid var(--focus-ring);
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    z-index: 200;
  }
  .skip-link:focus { top: 1rem; }

  .wrap { width: 100%; max-width: 600px; }

  .card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-subtle);
    border-radius: var(--r-lg);
    padding: 2rem;
    outline: none;
  }

  /* Focus ring applied to all interactive elements */
  :focus-visible {
    outline: 3px solid var(--focus-ring);
    outline-offset: 3px;
    border-radius: var(--r-md);
  }

  h1 {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 0.4rem;
  }

  .meta {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }

  .divider {
    border: none;
    border-top: 0.5px solid var(--border-subtle);
    margin: 1.5rem 0;
  }

  /* Progress */
  .progress-wrap { margin-bottom: 1.75rem; }
  .progress-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .progress-bar-bg {
    height: 4px; border-radius: 99px;
    background: var(--bg-secondary);
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 99px;
    background: var(--text-info);
    transition: width 0.3s ease;
  }

  /* Voting layout */
  .vs-grid {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: stretch;
    gap: 12px;
    margin-bottom: 0.75rem;
  }
  .vs-label {
    font-size: 13px; font-weight: 500;
    color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
  }
  .choice-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .choice-btn {
    width: 100%;
    padding: 16px 12px;
    border-radius: var(--r-lg);
    border: 1px solid var(--border-subtle);
    background: var(--bg-primary);
    cursor: pointer;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.5;
    text-align: center;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    word-break: break-word;
    overflow-wrap: anywhere;
    hyphens: none;
  }
  .choice-btn:hover { border-color: var(--border-mid); background: var(--bg-secondary); }
  .choice-btn:active { transform: scale(0.98); }
  .choice-btn[aria-pressed="true"] {
    border: 2px solid var(--border-info);
    background: var(--bg-info);
    color: var(--text-info);
  }
  .key-hint {
    font-size: 11px;
    color: var(--text-secondary);
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  /* Results */
  .result-row { margin-bottom: 18px; }
  .result-name {
    font-size: 13px; font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 3px;
    display: flex; align-items: center;
    flex-wrap: wrap; gap: 6px;
    line-height: 1.4;
  }
  .result-stats { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
  .bar-bg {
    height: 8px; border-radius: 99px;
    background: var(--bg-secondary); overflow: hidden;
  }
  .bar-fill {
    height: 100%; border-radius: 99px;
    background: var(--text-info);
    transition: width 0.4s ease;
  }
  .bar-fill.top { background: var(--text-success); }

  .tag {
    font-size: 11px; font-weight: 500;
    padding: 2px 8px; border-radius: 99px;
    background: var(--bg-success);
    color: var(--text-success);
    white-space: nowrap;
  }

  /* Action buttons */
  .action-btn {
    width: 100%; padding: 13px;
    border-radius: var(--r-md);
    border: 1px solid var(--border-mid);
    background: transparent;
    cursor: pointer;
    font-family: var(--font);
    font-size: 14px; font-weight: 500;
    color: var(--text-primary);
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    min-height: 44px;
  }
  .action-btn:hover { background: var(--bg-secondary); }
  .action-btn + .action-btn { margin-top: 10px; }
  .action-btn.success {
    background: var(--bg-success);
    border-color: var(--border-success);
    color: var(--text-success);
  }
  .btn-icon { width: 15px; height: 15px; flex-shrink: 0; }

  .footer-note { font-size: 13px; color: var(--text-secondary); margin-top: 1.25rem; line-height: 1.5; }

  /* Intro steps */
  .step { display: flex; gap: 14px; align-items: flex-start; }
  .step-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg-secondary);
    border: 0.5px solid var(--border-subtle);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 12px; font-weight: 500; color: var(--text-secondary);
    aria-hidden: true;
  }
  .step-title { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; }
  .step-body { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

  kbd {
    font-family: var(--font);
    font-size: 11px; font-weight: 500;
    padding: 1px 6px;
    border-radius: 4px;
    border: 1px solid var(--border-mid);
    background: var(--bg-secondary);
    color: var(--text-secondary);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--text-primary);
    color: var(--bg-primary);
    font-family: var(--font);
    font-size: 13px; font-weight: 500;
    padding: 10px 18px;
    border-radius: 99px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Live region for screen readers */
  .sr-announce {
    position: absolute;
    width: 1px; height: 1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
  }
</style>
</head>
<body>

<a href="#main" class="skip-link">Skip to main content</a>
<div class="sr-announce" aria-live="polite" aria-atomic="true" id="announce"></div>
<div class="toast" id="toast" role="status" aria-live="polite">Copied to clipboard</div>

<div class="wrap">
  <main id="main">
    <div class="card" id="root"></div>
  </main>
</div>

<script>
const NAMES = [
  "THE WEBSMITH SUMMIT 2026",
  "THE WEBSMITH CONFERENCE 2026",
  "HYPERLINK 2026",
  "MARKUP 2026",
  "UMBRACO FORGE"
  "UMBUK26",
  "INTERFACE2FACE 2026"
];

const STORAGE_KEY = "conference_pairwise_v1";

function getPairs() {
  const pairs = [];
  for (let i = 0; i < NAMES.length; i++)
    for (let j = i + 1; j < NAMES.length; j++)
      pairs.push([NAMES[i], NAMES[j]]);
  return pairs;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function esc(str) {
  return str.replace(/\\/g, "\\\\").replace(/'/g, "\\'");
}

function announce(msg) {
  const el = document.getElementById("announce");
  if (el) { el.textContent = ""; setTimeout(function() { el.textContent = msg; }, 50); }
}

let pairs = shuffle(getPairs()).map(function(p) { return Math.random() > 0.5 ? p : [p[1], p[0]]; });
let current = 0;
let picks = [];
let phase = "intro";
let wins = {};
let totalVoters = 0;

NAMES.forEach(function(n) { wins[n] = 0; });

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      wins = d.wins || wins;
      totalVoters = d.totalVoters || 0;
    }
  } catch(e) {}
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ wins, totalVoters }));
  } catch(e) {}
}

function pick(name) {
  if (picks[current]) return;
  picks[current] = { winner: name, pair: pairs[current] };
  announce("Selected: " + name + ". Moving to next matchup.");
  render();
  setTimeout(function() {
    if (current < pairs.length - 1) {
      current++;
      render();
      const firstBtn = document.querySelector(".choice-btn");
      if (firstBtn) firstBtn.focus();
    } else {
      applyPicks();
    }
  }, 260);
}

function applyPicks() {
  picks.forEach(function(p) {
    wins[p.winner] = (wins[p.winner] || 0) + 1;
  });
  totalVoters++;
  saveData();
  phase = "results";
  announce("Voting complete. Showing your results.");
  render();
  const heading = document.querySelector("#root h1");
  if (heading) heading.focus();
}

function startVoting() {
  phase = "vote";
  render();
  const firstBtn = document.querySelector(".choice-btn");
  if (firstBtn) firstBtn.focus();
}

function restart() {
  pairs = shuffle(getPairs()).map(function(p) { return Math.random() > 0.5 ? p : [p[1], p[0]]; });
  current = 0; picks = []; phase = "intro";
  render();
  const heading = document.querySelector("#root h1");
  if (heading) heading.focus();
}

const COPY_SVG = '<svg class="btn-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true" focusable="false"><rect x="5.5" y="1.5" width="9" height="11" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M10.5 4.5H2.5C1.67 4.5 1 5.17 1 6v8c0 .83.67 1.5 1.5 1.5h8c.83 0 1.5-.67 1.5-1.5V6c0-.83-.67-1.5-1.5-1.5z" stroke="currentColor" stroke-width="1.2"/></svg>';
const CHECK_SVG = '<svg class="btn-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true" focusable="false"><path d="M13.5 4.5L6.5 11.5L2.5 7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const RETRY_SVG = '<svg class="btn-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true" focusable="false"><path d="M2 8a6 6 0 1 0 1.5-3.9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M2 4v4h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function copyResults() {
  const topScore = Math.max.apply(null, Object.values(wins));
  const sorted = [...NAMES].sort(function(a, b) { return wins[b] - wins[a]; });
  const maxP = (NAMES.length - 1) * totalVoters;

  const lines = [
    "Conference Name Preference Test",
    "================================",
    totalVoters + " voter" + (totalVoters !== 1 ? "s" : "") + " \u00b7 " + (totalVoters * pairs.length) + " matchups judged",
    ""
  ];
  sorted.forEach(function(name, i) {
    const w = wins[name] || 0;
    const pct = maxP > 0 ? Math.round((w / maxP) * 100) : 0;
    const filled = Math.round(pct / 10);
    const bar = "\u2588".repeat(filled) + "\u2591".repeat(10 - filled);
    const medal = i === 0 ? "\uD83E\uDD47" : i === 1 ? "\uD83E\uDD48" : i === 2 ? "\uD83E\uDD49" : (i + 1) + ".";
    lines.push(medal + " " + name);
    lines.push("   " + bar + " " + pct + "% (" + w + " win" + (w !== 1 ? "s" : "") + ")");
  });
  lines.push("");
  lines.push("Tested using pairwise comparison \u2014 every name vs every other name.");

  const text = lines.join("\n");

  navigator.clipboard.writeText(text).then(function() {
    const btn = document.getElementById("copy-btn");
    if (btn) {
      btn.classList.add("success");
      btn.innerHTML = CHECK_SVG + " Copied to clipboard";
      btn.setAttribute("aria-label", "Results copied to clipboard");
      setTimeout(function() {
        btn.classList.remove("success");
        btn.innerHTML = COPY_SVG + " Copy results to clipboard";
        btn.setAttribute("aria-label", "Copy results to clipboard");
      }, 2500);
    }
    const toast = document.getElementById("toast");
    if (toast) {
      toast.classList.add("show");
      setTimeout(function() { toast.classList.remove("show"); }, 2500);
    }
    announce("Results copied to clipboard.");
  }).catch(function() {
    alert("Copy failed. Here are your results:\n\n" + text);
  });
}

function render() {
  const root = document.getElementById("root");

  if (phase === "intro") {
    root.innerHTML =
      '<div style="text-align:center;padding:0.5rem 0 0.25rem">'
      + '<p style="font-size:11px;font-weight:500;letter-spacing:0.12em;color:var(--text-secondary);text-transform:uppercase;margin-bottom:1.25rem" aria-hidden="true">Name testing</p>'
      + '<h1 style="font-size:22px;font-weight:500;margin-bottom:0.75rem;line-height:1.3" tabindex="-1">Conference Name<br>Preference Test</h1>'
      + '<p style="font-size:14px;color:var(--text-secondary);line-height:1.7;max-width:360px;margin:0 auto 2rem">We have a shortlist of names for an upcoming conference and need your honest opinion to help us decide.</p>'
      + '</div>'
      + '<hr class="divider" aria-hidden="true">'
      + '<ol style="display:flex;flex-direction:column;gap:14px;margin-bottom:2rem;list-style:none" aria-label="How it works">'
        + '<li class="step"><div class="step-num" aria-hidden="true">1</div><div><p class="step-title">15 head-to-head matchups</p><p class="step-body">Every name is paired against every other. You\'ll see two names at a time and pick the one that feels stronger.</p></div></li>'
        + '<li class="step"><div class="step-num" aria-hidden="true">2</div><div><p class="step-title">Go with your gut</p><p class="step-body">No context needed \u2014 just your honest first reaction. There are no right or wrong answers.</p></div></li>'
        + '<li class="step"><div class="step-num" aria-hidden="true">3</div><div><p class="step-title">Takes about 20 seconds</p><p class="step-body">Work through all the pairs in one sitting. Results appear as soon as you finish.</p></div></li>'
      + '</ol>'
      + '<button class="action-btn" onclick="startVoting()">Start voting</button>';
    return;
  }

  if (phase === "vote") {
    const pair = pairs[current];
    const pct = Math.round((current / pairs.length) * 100);
    const picked = picks[current] ? picks[current].winner : null;
    const p0picked = picked === pair[0];
    const p1picked = picked === pair[1];

    root.innerHTML =
      '<h1 tabindex="-1">Which name is better?</h1>'
      + '<p class="meta" id="vote-desc">Go with your gut \u2014 no context needed. Press <kbd>1</kbd> for the left option or <kbd>2</kbd> for the right.</p>'
      + '<div class="progress-wrap">'
        + '<p class="progress-label" id="progress-lbl">Matchup ' + (current + 1) + ' of ' + pairs.length + '</p>'
        + '<div class="progress-bar-bg" role="progressbar" aria-valuenow="' + (current + 1) + '" aria-valuemin="1" aria-valuemax="' + pairs.length + '" aria-labelledby="progress-lbl">'
          + '<div class="progress-bar-fill" style="width:' + pct + '%"></div>'
        + '</div>'
      + '</div>'
      + '<div class="vs-grid" role="group" aria-label="Matchup ' + (current + 1) + ': choose your preferred name">'
        + '<div class="choice-wrap">'
          + '<button class="choice-btn" aria-pressed="' + p0picked + '" aria-describedby="vote-desc" onclick="pick(\'' + esc(pair[0]) + '\')">' + pair[0] + '</button>'
          + '<p class="key-hint" aria-hidden="true"><kbd>1</kbd> for this option</p>'
        + '</div>'
        + '<span class="vs-label" aria-hidden="true">vs</span>'
        + '<div class="choice-wrap">'
          + '<button class="choice-btn" aria-pressed="' + p1picked + '" aria-describedby="vote-desc" onclick="pick(\'' + esc(pair[1]) + '\')">' + pair[1] + '</button>'
          + '<p class="key-hint" aria-hidden="true"><kbd>2</kbd> for this option</p>'
        + '</div>'
      + '</div>';
    return;
  }

  if (phase === "results") {
    const topScore = Math.max.apply(null, Object.values(wins));
    const sorted = [...NAMES].sort(function(a, b) { return wins[b] - wins[a]; });
    const maxWins = Math.max.apply(null, Object.values(wins).concat([1]));

    let rows = '<ol style="list-style:none;margin:0;padding:0" aria-label="Name rankings">';
    sorted.forEach(function(name, i) {
      const w = wins[name] || 0;
      const maxP = (NAMES.length - 1) * totalVoters;
      const pct = maxP > 0 ? Math.round((w / maxP) * 100) : 0;
      const isTop = w === topScore && topScore > 0;
      const barW = Math.round((w / maxWins) * 100);
      rows += '<li class="result-row">'
        + '<div class="result-name"><span>' + (i + 1) + '. ' + name + '</span>' + (isTop ? '<span class="tag">winner</span>' : '') + '</div>'
        + '<div class="result-stats">' + w + ' win' + (w !== 1 ? 's' : '') + ' \u00b7 ' + pct + '%</div>'
        + '<div class="bar-bg"><div class="bar-fill' + (isTop ? ' top' : '') + '" style="width:' + barW + '%" role="img" aria-label="' + pct + ' percent"></div></div>'
        + '</li>';
    });
    rows += '</ol>';

    root.innerHTML =
      '<h1 tabindex="-1">Results</h1>'
      + '<hr class="divider" aria-hidden="true">'
      + rows
      + '<p class="footer-note">Win % = wins out of all possible matchup wins. Results are stored locally in this browser.</p>'
      + '<button id="copy-btn" class="action-btn" onclick="copyResults()" aria-label="Copy results to clipboard">' + COPY_SVG + ' Copy results to clipboard</button>'
      + '<button class="action-btn" onclick="restart()" aria-label="Retry the test from the beginning">' + RETRY_SVG + ' Retry test</button>';
  }
}

document.addEventListener("keydown", function(e) {
  if (phase !== "vote") return;
  if (picks[current]) return;
  if (e.key === "1") { e.preventDefault(); pick(pairs[current][0]); }
  if (e.key === "2") { e.preventDefault(); pick(pairs[current][1]); }
});

loadData();
render();
</script>
</body>
</html>
